<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CALC — Premium Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
/* ═══════════════════════════════════════════════
   CALC·OS — Premium Calculator  |  style.css
   ═══════════════════════════════════════════════ */

/* ── CSS Variables (Themes) ─────────────────── */
:root {
  --transition-theme: 0.45s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] {
  --bg-primary:        #0a0a0f;
  --bg-card:           rgba(18, 18, 30, 0.72);
  --bg-display:        rgba(8, 8, 20, 0.85);
  --bg-btn-num:        rgba(38, 38, 60, 0.75);
  --bg-btn-func:       rgba(55, 40, 80, 0.70);
  --bg-btn-op:         rgba(30, 60, 110, 0.78);
  --bg-btn-back:       rgba(70, 30, 30, 0.60);

  --hover-num:         rgba(58, 58, 90, 0.95);
  --hover-func:        rgba(80, 55, 110, 0.95);
  --hover-op:          rgba(40, 80, 150, 0.95);
  --hover-back:        rgba(110, 40, 40, 0.95);

  --accent-1:          #5b8fff;
  --accent-2:          #a35bff;
  --accent-equals-a:   #5b8fff;
  --accent-equals-b:   #a35bff;
  --neon-glow:         0 0 18px rgba(91, 143, 255, 0.45);
  --neon-glow-op:      0 0 18px rgba(163, 91, 255, 0.45);

  --text-display:      #e8f0ff;
  --text-result:       rgba(160, 180, 255, 0.7);
  --text-num:          #dde6ff;
  --text-func:         #c9aaff;
  --text-op:           #80b0ff;
  --text-back:         #ff8888;
  --text-footer:       rgba(140, 150, 180, 0.55);

  --border-card:       rgba(91, 143, 255, 0.12);
  --border-btn:        rgba(255,255,255,0.05);
  --shadow-card:       0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(91,143,255,0.08);
  --shadow-btn:        0 4px 15px rgba(0,0,0,0.45);
  --shadow-btn-press:  0 1px 6px rgba(0,0,0,0.6);

  --blob-1: rgba(91, 143, 255, 0.18);
  --blob-2: rgba(163, 91, 255, 0.14);
  --blob-3: rgba(0, 200, 255, 0.10);

  --toggle-bg:         rgba(30,30,50,0.9);
  --toggle-thumb:      #5b8fff;
}

[data-theme="light"] {
  --bg-primary:        #eef2f9;
  --bg-card:           rgba(255, 255, 255, 0.82);
  --bg-display:        rgba(230, 238, 255, 0.90);
  --bg-btn-num:        rgba(245, 247, 255, 0.90);
  --bg-btn-func:       rgba(230, 225, 255, 0.88);
  --bg-btn-op:         rgba(210, 228, 255, 0.90);
  --bg-btn-back:       rgba(255, 230, 230, 0.88);

  --hover-num:         rgba(225, 232, 255, 1);
  --hover-func:        rgba(215, 205, 255, 1);
  --hover-op:          rgba(185, 215, 255, 1);
  --hover-back:        rgba(255, 210, 210, 1);

  --accent-1:          #3a6fea;
  --accent-2:          #7b3ff5;
  --accent-equals-a:   #3a6fea;
  --accent-equals-b:   #7b3ff5;
  --neon-glow:         0 0 18px rgba(58, 111, 234, 0.25);
  --neon-glow-op:      0 0 18px rgba(123, 63, 245, 0.22);

  --text-display:      #1a2250;
  --text-result:       rgba(60, 90, 200, 0.6);
  --text-num:          #1e2a55;
  --text-func:         #5a35b8;
  --text-op:           #2857c8;
  --text-back:         #c03030;
  --text-footer:       rgba(80, 100, 160, 0.5);

  --border-card:       rgba(58, 111, 234, 0.12);
  --border-btn:        rgba(0,0,0,0.04);
  --shadow-card:       0 20px 60px rgba(60, 100, 200, 0.14), 0 0 0 1px rgba(58,111,234,0.10);
  --shadow-btn:        0 3px 12px rgba(80,100,180,0.13), 0 1px 3px rgba(0,0,0,0.07);
  --shadow-btn-press:  0 1px 4px rgba(0,0,0,0.12) inset;

  --blob-1: rgba(58, 111, 234, 0.12);
  --blob-2: rgba(123, 63, 245, 0.10);
  --blob-3: rgba(0, 180, 255, 0.08);

  --toggle-bg:         rgba(200, 215, 245, 0.9);
  --toggle-thumb:      #3a6fea;
}

/* ── Reset & Base ────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
}

body {
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Poppins', sans-serif;
  background-color: var(--bg-primary);
  color: var(--text-num);
  transition: background-color var(--transition-theme), color var(--transition-theme);
  overflow: hidden;
}

/* ── Animated Background Blobs ───────────────── */
.bg-blobs {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  animation: blobDrift 18s ease-in-out infinite alternate;
  transition: background var(--transition-theme);
}

.blob-1 {
  width: 500px; height: 500px;
  background: var(--blob-1);
  top: -120px; left: -100px;
  animation-delay: 0s;
}
.blob-2 {
  width: 420px; height: 420px;
  background: var(--blob-2);
  bottom: -100px; right: -80px;
  animation-delay: -6s;
}
.blob-3 {
  width: 300px; height: 300px;
  background: var(--blob-3);
  top: 50%; left: 55%;
  animation-delay: -12s;
}

@keyframes blobDrift {
  0%   { transform: translate(0, 0) scale(1); }
  33%  { transform: translate(30px, -40px) scale(1.05); }
  66%  { transform: translate(-20px, 20px) scale(0.97); }
  100% { transform: translate(15px, 10px) scale(1.03); }
}

/* ── App Wrapper ─────────────────────────────── */
.app-wrapper {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  width: 100%;
  max-width: 420px;
  padding: 20px 16px;

  /* Fade-in on load */
  animation: fadeInUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── Header ──────────────────────────────────── */
.app-header {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 4px;
}

.brand {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 1.1rem;
  letter-spacing: 0.18em;
  color: var(--accent-1);
  text-shadow: 0 0 20px rgba(91,143,255,0.5);
  transition: color var(--transition-theme), text-shadow var(--transition-theme);
}

.brand-dot {
  color: var(--accent-2);
}

/* ── Theme Toggle ────────────────────────────── */
.theme-toggle {
  cursor: pointer;
  user-select: none;
}
.theme-toggle input { display: none; }

.toggle-track {
  position: relative;
  display: flex;
  align-items: center;
  width: 62px;
  height: 30px;
  background: var(--toggle-bg);
  border-radius: 99px;
  border: 1.5px solid var(--border-card);
  padding: 0 5px;
  transition: background var(--transition-theme);
  overflow: hidden;
}

.toggle-icon {
  font-size: 0.85rem;
  line-height: 1;
  transition: opacity 0.3s;
  z-index: 1;
}
.toggle-icon.moon { margin-right: auto; }
.toggle-icon.sun  { margin-left: auto; }

[data-theme="dark"]  .toggle-icon.sun  { opacity: 0.35; }
[data-theme="dark"]  .toggle-icon.moon { opacity: 1; }
[data-theme="light"] .toggle-icon.moon { opacity: 0.35; }
[data-theme="light"] .toggle-icon.sun  { opacity: 1; }

.toggle-thumb {
  position: absolute;
  top: 3px; left: 3px;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--toggle-thumb);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  transition: transform 0.38s cubic-bezier(0.34, 1.56, 0.64, 1), background var(--transition-theme);
  z-index: 2;
}

[data-theme="light"] .toggle-thumb {
  transform: translateX(32px);
}

/* ── Calculator Card ─────────────────────────── */
.calc-card {
  width: 100%;
  background: var(--bg-card);
  border: 1.5px solid var(--border-card);
  border-radius: 28px;
  box-shadow: var(--shadow-card);
  backdrop-filter: blur(24px) saturate(160%);
  -webkit-backdrop-filter: blur(24px) saturate(160%);
  padding: 22px 20px 20px;
  transition:
    background var(--transition-theme),
    box-shadow var(--transition-theme),
    border-color var(--transition-theme);
}

/* ── Display ─────────────────────────────────── */
.display-wrap {
  position: relative;
  background: var(--bg-display);
  border-radius: 18px;
  border: 1px solid var(--border-card);
  padding: 18px 22px 16px;
  margin-bottom: 18px;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: flex-end;
  overflow: hidden;
  transition: background var(--transition-theme), box-shadow 0.3s;
}

/* Glow when active */
.display-wrap.glow {
  box-shadow: var(--neon-glow);
}

.display-expression {
  font-family: 'Orbitron', monospace;
  font-size: clamp(1.5rem, 6vw, 2.2rem);
  font-weight: 500;
  color: var(--text-display);
  word-break: break-all;
  text-align: right;
  line-height: 1.2;
  transition: font-size 0.2s, color var(--transition-theme);
  min-height: 1.3em;
}

.display-result {
  font-family: 'Poppins', sans-serif;
  font-size: 1rem;
  font-weight: 300;
  color: var(--text-result);
  margin-top: 4px;
  min-height: 1.3em;
  transition: color var(--transition-theme);
}

/* Blinking cursor */
.display-cursor {
  position: absolute;
  bottom: 18px; right: 22px;
  width: 2px; height: 1.4em;
  background: var(--accent-1);
  border-radius: 2px;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
  animation: blink 1.1s step-end infinite;
}
.display-wrap.glow .display-cursor { opacity: 1; }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}

/* Error state */
.display-expression.error {
  color: #ff6b6b;
  animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  15%     { transform: translateX(-6px); }
  30%     { transform: translateX(6px); }
  45%     { transform: translateX(-5px); }
  60%     { transform: translateX(5px); }
  75%     { transform: translateX(-3px); }
  90%     { transform: translateX(3px); }
}

/* ── Button Grid ─────────────────────────────── */
.btn-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

/* ── Buttons Base ────────────────────────────── */
.btn {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1.5px solid var(--border-btn);
  border-radius: 14px;
  height: 64px;
  font-family: 'Poppins', sans-serif;
  font-size: 1.15rem;
  font-weight: 500;
  cursor: pointer;
  outline: none;
  overflow: hidden;
  box-shadow: var(--shadow-btn);
  transition:
    background 0.18s ease,
    box-shadow 0.18s ease,
    transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1),
    color var(--transition-theme),
    border-color var(--transition-theme);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  backdrop-filter: blur(6px);
}

/* Ripple effect */
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(255,255,255,0.18) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.btn:hover::after { opacity: 1; }

/* Number buttons */
.btn-num {
  background: var(--bg-btn-num);
  color: var(--text-num);
}
.btn-num:hover { background: var(--hover-num); box-shadow: var(--neon-glow), var(--shadow-btn); }

/* Function buttons (C, %, bracket, +/-) */
.btn-func {
  background: var(--bg-btn-func);
  color: var(--text-func);
}
.btn-func:hover { background: var(--hover-func); box-shadow: var(--neon-glow-op), var(--shadow-btn); }

/* Operator buttons */
.btn-op {
  background: var(--bg-btn-op);
  color: var(--text-op);
  font-size: 1.3rem;
  font-weight: 600;
}
.btn-op:hover { background: var(--hover-op); box-shadow: var(--neon-glow), var(--shadow-btn); }

/* Backspace button */
.btn-back {
  background: var(--bg-btn-back);
  color: var(--text-back);
  font-size: 0.95rem;
  font-weight: 500;
  gap: 6px;
}
.btn-back:hover { background: var(--hover-back); }

/* Full-width span */
.btn-full {
  grid-column: 1 / -1;
  height: 50px;
  border-radius: 14px;
}

/* Equals button — gradient hero */
.btn-equals {
  background: linear-gradient(135deg, var(--accent-equals-a), var(--accent-equals-b));
  color: #fff;
  font-size: 1.5rem;
  font-weight: 700;
  border-color: transparent;
  box-shadow: 0 4px 20px rgba(91, 143, 255, 0.35);
}

.btn-equals:hover {
  box-shadow: 0 6px 28px rgba(91, 143, 255, 0.55);
  filter: brightness(1.1);
}

/* Press animation */
.btn:active,
.btn.pressed {
  transform: scale(0.92);
  box-shadow: var(--shadow-btn-press);
}

.btn-equals:active,
.btn-equals.pressed {
  transform: scale(0.92);
  box-shadow: 0 2px 8px rgba(91, 143, 255, 0.3);
}

/* Result flash animation on display */
@keyframes resultFlash {
  0%   { opacity: 0; transform: translateY(8px); }
  100% { opacity: 1; transform: translateY(0); }
}
.display-expression.flash {
  animation: resultFlash 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
}

/* ── Footer ──────────────────────────────────── */
.app-footer {
  font-size: 0.7rem;
  font-weight: 300;
  color: var(--text-footer);
  letter-spacing: 0.04em;
  text-align: center;
  transition: color var(--transition-theme);
}

/* ── Responsive ──────────────────────────────── */
@media (max-width: 400px) {
  .app-wrapper { padding: 14px 10px; }
  .calc-card   { padding: 16px 14px 14px; }
  .btn         { height: 56px; font-size: 1.05rem; border-radius: 12px; }
  .btn-full    { height: 44px; }
  .btn-grid    { gap: 8px; }
  .display-expression { font-size: 1.4rem; }
  .brand       { font-size: 0.95rem; }
}

@media (min-width: 500px) {
  .app-wrapper { max-width: 460px; }
  .btn         { height: 70px; font-size: 1.2rem; }
  .btn-full    { height: 54px; }
}

@media (min-width: 700px) {
  .app-wrapper { max-width: 500px; }
}

/* ── Scrollbar (dark mode) ───────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--accent-1); border-radius: 3px; }

  </style>
</head>
<body>

  <!-- Animated background blobs -->
  <div class="bg-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Main calculator wrapper -->
  <main class="app-wrapper">

    <!-- Header bar -->
    <header class="app-header">
      <span class="brand">CALC<span class="brand-dot">·</span>OS</span>
      <label class="theme-toggle" title="Toggle theme" aria-label="Toggle light/dark mode">
        <input type="checkbox" id="themeSwitch" />
        <span class="toggle-track">
          <span class="toggle-icon moon">☽</span>
          <span class="toggle-icon sun">☀</span>
          <span class="toggle-thumb"></span>
        </span>
      </label>
    </header>

    <!-- Calculator card -->
    <div class="calc-card">

      <!-- Display -->
      <div class="display-wrap">
        <div class="display-expression" id="expression" aria-live="polite">0</div>
        <div class="display-result" id="result" aria-live="polite"></div>
        <div class="display-cursor" aria-hidden="true"></div>
      </div>

      <!-- Button grid -->
      <div class="btn-grid" id="btnGrid">

        <!-- Row 1 -->
        <button class="btn btn-func btn-wide" data-action="clear"    aria-label="Clear all">C</button>
        <button class="btn btn-func"          data-action="bracket"  aria-label="Bracket">( )</button>
        <button class="btn btn-func"          data-action="percent"  aria-label="Percent">%</button>
        <button class="btn btn-op"            data-action="operator" data-value="÷" aria-label="Divide">÷</button>

        <!-- Row 2 -->
        <button class="btn btn-num" data-action="digit" data-value="7">7</button>
        <button class="btn btn-num" data-action="digit" data-value="8">8</button>
        <button class="btn btn-num" data-action="digit" data-value="9">9</button>
        <button class="btn btn-op"  data-action="operator" data-value="×" aria-label="Multiply">×</button>

        <!-- Row 3 -->
        <button class="btn btn-num" data-action="digit" data-value="4">4</button>
        <button class="btn btn-num" data-action="digit" data-value="5">5</button>
        <button class="btn btn-num" data-action="digit" data-value="6">6</button>
        <button class="btn btn-op"  data-action="operator" data-value="−" aria-label="Subtract">−</button>

        <!-- Row 4 -->
        <button class="btn btn-num" data-action="digit" data-value="1">1</button>
        <button class="btn btn-num" data-action="digit" data-value="2">2</button>
        <button class="btn btn-num" data-action="digit" data-value="3">3</button>
        <button class="btn btn-op"  data-action="operator" data-value="+" aria-label="Add">+</button>

        <!-- Row 5 -->
        <button class="btn btn-func"          data-action="toggleSign" aria-label="Toggle sign">+/−</button>
        <button class="btn btn-num"           data-action="digit"    data-value="0">0</button>
        <button class="btn btn-num"           data-action="decimal"  aria-label="Decimal">.</button>
        <button class="btn btn-equals"        data-action="equals"   aria-label="Equals">=</button>

        <!-- Backspace row (extra row at bottom, full width) -->
        <button class="btn btn-back btn-full" data-action="backspace" aria-label="Backspace">⌫ Backspace</button>

      </div>

    </div><!-- /calc-card -->

    <footer class="app-footer">
      <span>Keyboard supported · ESC to clear · Enter to calculate</span>
    </footer>

  </main>

  <script>
/**
 * CALC·OS — Premium Calculator
 * script.js  |  ES6 Module-style, no external libraries
 */

'use strict';

/* ── DOM References ───────────────────────────── */
const expressionEl = document.getElementById('expression');
const resultEl     = document.getElementById('result');
const displayWrap  = document.querySelector('.display-wrap');
const btnGrid      = document.getElementById('btnGrid');
const themeSwitch  = document.getElementById('themeSwitch');
const htmlEl       = document.documentElement;

/* ── State ────────────────────────────────────── */
let state = {
  expression:    '',   // raw display string (uses ×, ÷, −)
  justEvaluated: false // prevents appending after = unless digit
};

/* ── Theme Management ─────────────────────────── */
function applyTheme(theme) {
  htmlEl.setAttribute('data-theme', theme);
  themeSwitch.checked = (theme === 'light');
  localStorage.setItem('calc-theme', theme);
}

function initTheme() {
  const saved = localStorage.getItem('calc-theme');
  const preferred = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  applyTheme(saved || preferred);
}

themeSwitch.addEventListener('change', () => {
  applyTheme(themeSwitch.checked ? 'light' : 'dark');
});

/* ── Display Helpers ──────────────────────────── */

/**
 * Adjusts font size of expression to prevent overflow.
 */
function adaptFontSize() {
  const len = state.expression.length;
  let size;
  if (len <= 10)      size = 'clamp(1.5rem, 6vw, 2.2rem)';
  else if (len <= 16) size = 'clamp(1.2rem, 5vw, 1.7rem)';
  else if (len <= 22) size = 'clamp(1rem, 4vw, 1.35rem)';
  else                size = 'clamp(0.85rem, 3.5vw, 1.1rem)';
  expressionEl.style.fontSize = size;
}

/**
 * Render state to the DOM.
 * @param {boolean} [flash] - animate expression in
 */
function render(flash = false) {
  expressionEl.classList.remove('error', 'flash');

  // Force reflow to re-trigger animation
  void expressionEl.offsetWidth;

  expressionEl.textContent = state.expression || '0';

  if (flash) {
    expressionEl.classList.add('flash');
  }

  adaptFontSize();

  // Show live preview result (while typing)
  const preview = livePreview();
  resultEl.textContent = preview;
}

/**
 * Show error state.
 */
function renderError(msg = 'Error') {
  expressionEl.classList.remove('flash');
  void expressionEl.offsetWidth;
  expressionEl.textContent = msg;
  expressionEl.classList.add('error');
  resultEl.textContent = '';
  adaptFontSize();
}

/**
 * Activate display glow while user interacts.
 */
let glowTimeout;
function triggerGlow() {
  displayWrap.classList.add('glow');
  clearTimeout(glowTimeout);
  glowTimeout = setTimeout(() => displayWrap.classList.remove('glow'), 1800);
}

/* ── Expression Parsing ───────────────────────── */

/**
 * Convert display expression (with ×, ÷, −) to a JS-evaluable string.
 */
function toEvalString(expr) {
  return expr
    .replace(/×/g, '*')
    .replace(/÷/g, '/')
    .replace(/−/g, '-')
    .replace(/\^/g, '**');
}

/**
 * Count open vs closed brackets in expression.
 */
function bracketBalance(expr) {
  let open = 0;
  for (const ch of expr) {
    if (ch === '(') open++;
    else if (ch === ')') open--;
  }
  return open; // positive = more opens than closes
}

/**
 * Live preview: attempt to evaluate the current expression quietly.
 */
function livePreview() {
  if (!state.expression) return '';
  try {
    const raw = toEvalString(state.expression);
    // Only preview if expression looks complete (ends with digit or close bracket)
    if (!/[\d)]$/.test(state.expression)) return '';
    const val = Function('"use strict"; return (' + raw + ')')();
    if (!isFinite(val)) return '';
    const str = formatResult(val);
    // Don't show preview if it matches the expression
    if (str === state.expression) return '';
    return '= ' + str;
  } catch {
    return '';
  }
}

/**
 * Format a numeric result nicely.
 */
function formatResult(val) {
  if (Number.isInteger(val)) return String(val);
  // Up to 10 significant digits, strip trailing zeros
  return parseFloat(val.toPrecision(10)).toString();
}

/* ── Input Logic ──────────────────────────────── */
const OPERATORS = ['+', '−', '×', '÷'];

/**
 * Get the last character of the expression.
 */
function lastChar() {
  return state.expression.slice(-1);
}

/**
 * Returns true if last char is an operator.
 */
function endsWithOperator() {
  return OPERATORS.includes(lastChar());
}

/**
 * Returns true if last char is an open bracket.
 */
function endsWithOpen() {
  return lastChar() === '(';
}

/**
 * Append a digit (0–9).
 */
function inputDigit(d) {
  if (state.justEvaluated) {
    // Start fresh after evaluation
    state.expression = d;
    state.justEvaluated = false;
  } else {
    // Don't allow leading zeros like "007"
    if (state.expression === '0' && d !== '.') {
      state.expression = d;
    } else {
      state.expression += d;
    }
  }
  render();
  triggerGlow();
}

/**
 * Append a decimal point.
 */
function inputDecimal() {
  if (state.justEvaluated) {
    state.expression = '0.';
    state.justEvaluated = false;
    render();
    triggerGlow();
    return;
  }
  // Find the last number segment and check if it already has a dot
  const segments = state.expression.split(/[\+\−\×\÷\(]/);
  const lastSeg = segments[segments.length - 1];
  if (lastSeg.includes('.')) return; // already has decimal
  if (!state.expression || endsWithOperator() || endsWithOpen()) {
    state.expression += '0.';
  } else {
    state.expression += '.';
  }
  render();
  triggerGlow();
}

/**
 * Append an operator (+, −, ×, ÷).
 */
function inputOperator(op) {
  state.justEvaluated = false;
  if (!state.expression) {
    // Allow leading minus
    if (op === '−') { state.expression = '−'; render(); triggerGlow(); }
    return;
  }
  // Replace trailing operator
  if (endsWithOperator()) {
    state.expression = state.expression.slice(0, -1) + op;
  } else if (!endsWithOpen()) {
    state.expression += op;
  }
  render();
  triggerGlow();
}

/**
 * Smart bracket: insert ( or ) based on context.
 */
function inputBracket() {
  state.justEvaluated = false;
  const balance = bracketBalance(state.expression);
  const last = lastChar();

  if (!state.expression || endsWithOperator() || last === '(') {
    // Open bracket
    state.expression += '(';
  } else if (balance > 0 && /[\d\.]/.test(last) || last === ')') {
    // Close bracket
    state.expression += ')';
  } else {
    // Default: open
    state.expression += '(';
  }
  render();
  triggerGlow();
}

/**
 * Append a % — converts last number to /100.
 */
function inputPercent() {
  if (!state.expression) return;
  state.justEvaluated = false;
  state.expression += '%';
  // Replace % with /100 in evaluation
  render();
  triggerGlow();
}

/**
 * Toggle sign of the last number in expression.
 */
function inputToggleSign() {
  if (!state.expression) return;
  state.justEvaluated = false;

  // Try to find the last number in the expression
  const match = state.expression.match(/(.*[\+\−\×\÷\(]|^)(−?)(\d+\.?\d*)$/);
  if (!match) return;

  const prefix = match[1];
  const sign   = match[2];
  const num    = match[3];

  state.expression = prefix + (sign === '−' ? '' : '−') + num;
  render();
  triggerGlow();
}

/**
 * Backspace: remove last character.
 */
function inputBackspace() {
  if (state.justEvaluated) {
    clearAll();
    return;
  }
  if (!state.expression) return;
  state.expression = state.expression.slice(0, -1);
  render();
  triggerGlow();
}

/**
 * Clear all.
 */
function clearAll() {
  state.expression = '';
  state.justEvaluated = false;
  expressionEl.classList.remove('error', 'flash');
  expressionEl.style.fontSize = '';
  render();
  displayWrap.classList.remove('glow');
}

/**
 * Evaluate the expression.
 */
function evaluate() {
  if (!state.expression) return;

  try {
    // Auto-close unclosed brackets
    const balance = bracketBalance(state.expression);
    let expr = state.expression + ')'.repeat(Math.max(0, balance));

    // Handle % -> /100
    expr = expr.replace(/(\d+\.?\d*)%/g, '($1/100)');

    const evalStr = toEvalString(expr);

    // Safety check: only allow safe math characters
    if (!/^[\d\s\+\-\*\/\.\(\)\%\^e]+$/i.test(evalStr)) {
      throw new Error('Invalid expression');
    }

    const val = Function('"use strict"; return (' + evalStr + ')')();

    if (!isFinite(val)) {
      throw new Error(val === Infinity || val === -Infinity ? 'Infinity' : 'Error');
    }

    const result = formatResult(val);

    // Show previous expression as preview, result as main
    resultEl.textContent = state.expression + ' =';
    state.expression = result;
    state.justEvaluated = true;

    render(true);
    displayWrap.classList.add('glow');
    glowTimeout = setTimeout(() => displayWrap.classList.remove('glow'), 2500);

  } catch (err) {
    renderError(err.message === 'Infinity' ? '∞ Error' : 'Invalid Expression');
    state.expression = '';
    state.justEvaluated = false;
  }
}

/* ── Button Click Handling ────────────────────── */
function handleAction(action, value) {
  switch (action) {
    case 'digit':      inputDigit(value);    break;
    case 'operator':   inputOperator(value); break;
    case 'decimal':    inputDecimal();       break;
    case 'bracket':    inputBracket();       break;
    case 'percent':    inputPercent();       break;
    case 'toggleSign': inputToggleSign();    break;
    case 'backspace':  inputBackspace();     break;
    case 'clear':      clearAll();           break;
    case 'equals':     evaluate();           break;
  }
}

/* Button press visual feedback */
function pressButton(btn) {
  btn.classList.add('pressed');
  setTimeout(() => btn.classList.remove('pressed'), 140);
}

btnGrid.addEventListener('click', (e) => {
  const btn = e.target.closest('.btn');
  if (!btn) return;
  const { action, value } = btn.dataset;
  if (!action) return;
  pressButton(btn);
  handleAction(action, value);
});

/* ── Keyboard Support ─────────────────────────── */
const keyMap = {
  '0': ['digit', '0'],   '1': ['digit', '1'],   '2': ['digit', '2'],
  '3': ['digit', '3'],   '4': ['digit', '4'],   '5': ['digit', '5'],
  '6': ['digit', '6'],   '7': ['digit', '7'],   '8': ['digit', '8'],
  '9': ['digit', '9'],

  '+': ['operator', '+'],
  '-': ['operator', '−'],
  '*': ['operator', '×'],
  '/': ['operator', '÷'],
  'x': ['operator', '×'],

  '.': ['decimal',    null],
  ',': ['decimal',    null],
  '%': ['percent',    null],
  '(': ['bracket',    null],
  ')': ['bracket',    null],

  'Enter':     ['equals',    null],
  '=':         ['equals',    null],
  'Backspace': ['backspace', null],
  'Delete':    ['clear',     null],
  'Escape':    ['clear',     null],
};

document.addEventListener('keydown', (e) => {
  // Don't interfere with theme toggle checkbox
  if (e.target === themeSwitch) return;

  const mapped = keyMap[e.key];
  if (!mapped) return;

  e.preventDefault();

  const [action, value] = mapped;
  handleAction(action, value);

  // Visually highlight the matching button
  const selector = `[data-action="${action}"]` +
    (value ? `[data-value="${value}"]` : '');
  const matchBtn = btnGrid.querySelector(selector);
  if (matchBtn) pressButton(matchBtn);
});

/* ── Click Sound (optional, minimal) ─────────── */
function createClickSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    return () => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g);
      g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(900, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.04);
      g.gain.setValueAtTime(0.06, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.07);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.07);
    };
  } catch { return () => {}; }
}

const playClick = createClickSound();

btnGrid.addEventListener('pointerdown', (e) => {
  if (e.target.closest('.btn')) playClick();
});

/* ── Init ─────────────────────────────────────── */
initTheme();
render();

  </script>
</body>
</html>
